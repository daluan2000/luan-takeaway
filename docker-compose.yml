services:
  luan-mysql:
    image: registry.cn-hangzhou.aliyuncs.com/dockerhub_mirror/mysql-server:8.0.32
    pull_policy: if_not_present
    environment:
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: root
    restart: "no"
    container_name: luan-mysql
    ports:
      - 33306:3306
    volumes:
      - ./db/luan.sql:/docker-entrypoint-initdb.d/01-luan.sql:ro
      - ./db/luan_config.sql:/docker-entrypoint-initdb.d/02-luan_config.sql:ro
    networks:
      - spring_cloud_default

  luan-phpmyadmin:
    image: phpmyadmin:latest
    restart: "no"
    container_name: luan-phpmyadmin
    hostname: luan-phpmyadmin
    ports:
      - 8082:80
    environment:
      PMA_HOST: luan-mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      luan-mysql:
        condition: service_healthy
    networks:
      - spring_cloud_default

  luan-redis:
    image: registry.cn-hangzhou.aliyuncs.com/dockerhub_mirror/redis
    ports:
      - 36379:6379
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: "no"
    container_name: luan-redis
    hostname: luan-redis
    networks:
      - spring_cloud_default

  luan-rabbitmq:
    image: rabbitmq:3.13-management
    restart: "no"
    container_name: luan-rabbitmq
    hostname: luan-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - 35672:5672
      - 35673:15672
    networks:
      - spring_cloud_default

  luan-register:
    image: nacos/nacos-server:v2.4.3
    restart: "no"
    ports:
      - 8848:8848
      - 9848:9848
      - 8080:8080
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: luan-mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: luan_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root
      MYSQL_SERVICE_DB_PARAM: characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      NACOS_AUTH_ENABLE: true
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
      NACOS_AUTH_TOKEN: VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg=
    container_name: luan-register
    hostname: luan-register
    depends_on:
      luan-mysql:
        condition: service_healthy
    networks:
      - spring_cloud_default

  luan-gateway:
    build:
      context: ./luan-gateway
    restart: "no"
    ports:
      - 9999:9999
    container_name: luan-gateway
    hostname: luan-gateway
    image: luan-gateway
    environment:
      REDIS_HOST: luan-redis
      NACOS_HOST: luan-register
    depends_on:
      luan-redis:
        condition: service_started
      luan-register:
        condition: service_started
    networks:
      - spring_cloud_default

  luan-auth:
    build:
      context: ./luan-auth
    restart: "no"
    container_name: luan-auth
    hostname: luan-auth
    image: luan-auth
    environment:
      REDIS_HOST: luan-redis
      NACOS_HOST: luan-register
    depends_on:
      luan-redis:
        condition: service_started
      luan-register:
        condition: service_started
    networks:
      - spring_cloud_default

  luan-takeaway-ai:
    build:
      context: ./luan-takeaway/luan-takeaway-ai/luan-takeaway-ai-biz
    restart: "no"
    image: luan-takeaway-ai
    container_name: luan-takeaway-ai
    hostname: luan-takeaway-ai
    environment:
      REDIS_HOST: luan-redis
      NACOS_HOST: luan-register
      AI_LLM_ENABLED: "true"
      AI_LLM_SOURCE: ${AI_LLM_SOURCE:-local}
      AI_LLM_LOCAL_BASE_URL: ${AI_LLM_LOCAL_BASE_URL:-http://host.docker.internal:8000/v1}
      AI_LLM_LOCAL_MODEL: ${AI_LLM_LOCAL_MODEL:-qwen3.5-4b}
      AI_LLM_LOCAL_API_KEY: ${AI_LLM_LOCAL_API_KEY:-EMPTY}
      AI_LLM_REMOTE_BASE_URL: ${AI_LLM_REMOTE_BASE_URL:-}
      AI_LLM_REMOTE_MODEL: ${AI_LLM_REMOTE_MODEL:-}
      AI_LLM_REMOTE_API_KEY: ${AI_LLM_REMOTE_API_KEY:-}
      AI_LLM_TIMEOUT_MS: ${AI_LLM_TIMEOUT_MS:-5000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      luan-redis:
        condition: service_started
      luan-register:
        condition: service_started
    networks:
      - spring_cloud_default

  luan-upms:
    build:
      context: ./luan-upms/luan-upms-biz
    restart: "no"
    container_name: luan-upms
    hostname: luan-upms
    image: luan-upms
    volumes:
      - /home/luan/data/takeaway/files:/home/luan/data/takeaway/files
    environment:
      MYSQL_HOST: luan-mysql
      REDIS_HOST: luan-redis
      NACOS_HOST: luan-register
      RABBITMQ_HOST: luan-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      luan-mysql:
        condition: service_healthy
      luan-redis:
        condition: service_started
      luan-register:
        condition: service_started
      luan-rabbitmq:
        condition: service_started
    networks:
      - spring_cloud_default

  luan-takeaway-user:
    build:
      context: ./luan-takeaway/luan-takeaway-user/luan-takeaway-user-biz
    restart: "no"
    image: luan-takeaway-user
    container_name: luan-takeaway-user
    hostname: luan-takeaway-user
    environment:
      MYSQL_HOST: luan-mysql
      REDIS_HOST: luan-redis
      NACOS_HOST: luan-register
      RABBITMQ_HOST: luan-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      luan-mysql:
        condition: service_healthy
      luan-redis:
        condition: service_started
      luan-register:
        condition: service_started
      luan-rabbitmq:
        condition: service_started
    networks:
      - spring_cloud_default

  luan-takeaway-dish:
    build:
      context: ./luan-takeaway/luan-takeaway-dish/luan-takeaway-dish-biz
    restart: "no"
    image: luan-takeaway-dish
    container_name: luan-takeaway-dish
    hostname: luan-takeaway-dish
    environment:
      MYSQL_HOST: luan-mysql
      REDIS_HOST: luan-redis
      NACOS_HOST: luan-register
    depends_on:
      luan-mysql:
        condition: service_healthy
      luan-redis:
        condition: service_started
      luan-register:
        condition: service_started
    networks:
      - spring_cloud_default

  luan-takeaway-order:
    build:
      context: ./luan-takeaway/luan-takeaway-order/luan-takeaway-order-biz
    restart: "no"
    image: luan-takeaway-order
    container_name: luan-takeaway-order
    hostname: luan-takeaway-order
    environment:
      MYSQL_HOST: luan-mysql
      REDIS_HOST: luan-redis
      NACOS_HOST: luan-register
    depends_on:
      luan-mysql:
        condition: service_healthy
      luan-redis:
        condition: service_started
      luan-register:
        condition: service_started
    networks:
      - spring_cloud_default

  luan-takeaway-pay:
    build:
      context: ./luan-takeaway/luan-takeaway-pay/luan-takeaway-pay-biz
    restart: "no"
    image: luan-takeaway-pay
    container_name: luan-takeaway-pay
    hostname: luan-takeaway-pay
    environment:
      MYSQL_HOST: luan-mysql
      REDIS_HOST: luan-redis
      NACOS_HOST: luan-register
    depends_on:
      luan-mysql:
        condition: service_healthy
      luan-redis:
        condition: service_started
      luan-register:
        condition: service_started
    networks:
      - spring_cloud_default

networks:
  spring_cloud_default:
    name:  spring_cloud_default
    driver: bridge
