server:
  undertow:
    threads:
      io: ${UNDERTOW_IO_THREADS:32}
      worker: ${UNDERTOW_WORKER_THREADS:512}

spring:
  cache:
    type: redis # 缓存类型 Redis
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:35672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  data:
    redis:
      database: 5
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:36379}
      timeout: ${REDIS_TIMEOUT:3000ms}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:3000ms}
      lettuce:
        pool:
          max-active: ${REDIS_MAX_ACTIVE:256}
          max-idle: ${REDIS_MAX_IDLE:128}
          min-idle: ${REDIS_MIN_IDLE:32}
          max-wait: ${REDIS_MAX_WAIT:5s}
  # 数据库相关配置
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:33306}/${MYSQL_DB:luan}?characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8&allowMultiQueries=true&nullCatalogMeansCurrent=true
    dynamic:
      hikari:
        maximum-pool-size: ${MYSQL_MAX_POOL_SIZE:256}
        minimum-idle: ${MYSQL_MIN_IDLE:32}
        connection-timeout: ${MYSQL_CONNECTION_TIMEOUT:30000}
        validation-timeout: ${MYSQL_VALIDATION_TIMEOUT:5000}
        idle-timeout: ${MYSQL_IDLE_TIMEOUT:300000}
        max-lifetime: ${MYSQL_MAX_LIFETIME:1800000}
        keepalive-time: ${MYSQL_KEEPALIVE_TIME:300000}
  task:
    execution:
      thread-name-prefix: takeaway-async-
      pool:
        core-size: ${ASYNC_CORE_SIZE:32}
        max-size: ${ASYNC_MAX_SIZE:128}
        queue-capacity: ${ASYNC_QUEUE_CAPACITY:2000}
        keep-alive: ${ASYNC_KEEP_ALIVE:60s}
      shutdown:
        await-termination: true
        await-termination-period: 30s

# 本地文件系统
file:
  local:
    enable: true
    base-path: /home/luan/data/takeaway/files

## 登录配置
security:
  # 登录报文加密根密钥 ，必须是16位
  encodeKey: thanks,pig4cloud
  # 跳过验证码校验的客户端
  ignore-clients:
    - test

# 配置文件加密根密码
jasypt:
  encryptor:
    password: pig  # 加密根密码
    algorithm: PBEWithMD5AndDES  # 加密算法
    iv-generator-classname: org.jasypt.iv.NoIvGenerator # 无向量生成器

# 短信插件配置：https://www.yuque.com/vxixfq/pig/zw8udk
sms:
  is-print: false # 是否打印日志
  config-type: yaml # 配置类型，yaml

takeaway:
  # 部署模式: single=单体模式(本地调用), cloud=微服务模式(Feign调用)
  deploy-mode: single
  ws:
    push:
      mq:
        enabled: ${TAKEAWAY_WS_PUSH_MQ_ENABLED:true}

ai:
  assistant:
    max-recommendation: 5
    llm:
      enabled: ${AI_LLM_ENABLED:true}
      source: ${AI_LLM_SOURCE:local}
      base-url: ${AI_LLM_BASE_URL:http://127.0.0.1:11434/v1}
      api-key: ${AI_LLM_API_KEY:}
      model: ${AI_LLM_MODEL:qwen2.5:7b}
      local-base-url: ${AI_LLM_LOCAL_BASE_URL:http://127.0.0.1:8000/v1}
      local-api-key: ${AI_LLM_LOCAL_API_KEY:EMPTY}
      local-model: ${AI_LLM_LOCAL_MODEL:qwen3.5-4b}
      remote-base-url: ${AI_LLM_REMOTE_BASE_URL:}
      remote-api-key: ${AI_LLM_REMOTE_API_KEY:}
      remote-model: ${AI_LLM_REMOTE_MODEL:}
      timeout-ms: ${AI_LLM_TIMEOUT_MS:30000}